booking.property=Booling Profile Dev

spring.application.name=booking-microservice
server.port=0
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}
# Evita conflicto cuando se ejecutan multiples instancias en la misma maquina
eureka.instance.prefer-ip-address=true

spring.datasource.url=jdbc:mysql://192.168.1.71:3306/laboratorio
spring.datasource.username=laboratorio
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true