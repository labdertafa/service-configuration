product.property=Product Profile Dev

spring.application.name=product-microservice
server.port=0
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}
# Evita conflicto cuando se ejecutan multiples instancias en la misma maquina
eureka.instance.prefer-ip-address=true

spring.data.mongodb.uri=mongodb://admin:1234@192.168.1.71:27017/productdb?authSource=admin
spring.data.mongodb.database=productdb

